min_version: 2.1.9

pre-commit:
  jobs:
    - name: prettier
      run: npx --no-install prettier --check .
    - name: uv
      group:
        jobs:
          - name: sync
            run: uv sync --check
          - name: lock
            run: uv lock --check
    - name: ruff
      env:
        UV_NO_SYNC: "true"
      group:
        jobs:
          - name: check
            run: uv run ruff check .
          - name: format
            run: uv run ruff format --diff .
    - name: djlint
      env:
        UV_NO_SYNC: "true"
      group:
        jobs:
          - name: lint
            run: uv run djlint --lint --check .
          - name: format
            run: uv run djlint --reformat --check .
    - name: django
      env:
        UV_NO_SYNC: "true"
      group:
        jobs:
          - name: check
            run: uv run manage.py check --fail-level=ERROR
          - name: makemigrations
            run: uv run manage.py makemigrations --check
          - name: makemessages
            run: |
              uv run manage.py makemessages --all --no-location --no-obsolete
              git diff --exit-code ":(glob)**/*.po"

commit-msg:
  jobs:
    - name: commitlint
      only:
        - ref: main
      run: npx --no-install commitlint --edit {1}
