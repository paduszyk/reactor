templates:
  npm-exec: npm exec --no --
  uv-run: uv run --no-sync

pre-commit:
  jobs:
    - name: Prettier
      run: |
        {npm-exec} prettier --check .
    - name: uv
      group:
        jobs:
          - name: Lock file check
            run: |
              uv lock --check
    - name: Ruff
      group:
        jobs:
          - name: Linter
            run: |
              {uv-run} ruff check .
          - name: Formatter
            run: |
              {uv-run} ruff format --check .
    - name: djLint
      group:
        jobs:
          - name: Linter
            run: |
              {uv-run} djlint --lint --check .
          - name: Formatter
            run: |
              {uv-run} djlint --reformat --check .
    - name: Django
      group:
        jobs:
          - name: System check
            run: |
              {uv-run} manage.py check
          - name: Migrations
            run: |
              {uv-run} manage.py makemigrations --check
          - name: Translation files
            run: |
              set -e

              {uv-run} manage.py makemessages --all --no-location --no-obsolete
              git diff --exit-code -- ":(glob)**/*.po"
              {uv-run} manage.py compilemessages --ignore=".venv"
