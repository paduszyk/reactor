templates:
  npm-exec: npm exec --no --
  uv-run: uv run --no-sync

pre-commit:
  jobs:
    - name: Prettier
      run: |
        {npm-exec} prettier --check .
    - name: uv
      group:
        jobs:
          - name: Lock file check
            run: |
              uv lock --check
    - name: Ruff
      group:
        jobs:
          - name: Linter
            run: |
              {uv-run} ruff check .
          - name: Formatter
            run: |
              {uv-run} ruff format --check .
