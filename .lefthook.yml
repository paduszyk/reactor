pre-commit:
  jobs:
    - name: prettier
      run: npx prettier --check .
    - name: uv
      run: uv lock --check
    - name: ruff (linter)
      run: uv run ruff check --output-format=full .
    - name: ruff (formatter)
      run: uv run ruff format --diff .
    - name: djlint (linter)
      run: uv run djlint --lint --check .
    - name: djlint (formatter)
      run: uv run djlint --reformat --check .
    - name: django (system check)
      run: uv run python manage.py check --fail-level=ERROR
    - name: django (migrations)
      run: uv run python manage.py makemigrations --check
    - name: django (translations)
      run: uv run python manage.py makemessages --all --no-location && git diff --exit-code "*.po"

output:
  - meta
  - summary
