pre-commit:
  jobs:
    - name: prettier
      run: npx --no-install prettier --check .
    - name: uv
      run: uv lock --check
    - name: ruff
      group:
        jobs:
          - name: check
            run: uv run --locked ruff check .
          - name: format
            run: uv run --locked ruff format --diff .
    - name: djlint
      group:
        jobs:
          - name: lint
            run: uv run --locked djlint --lint --check .
          - name: reformat
            run: uv run --locked djlint --reformat --check .
    - name: django
      group:
        jobs:
          - name: check
            run: uv run --locked python manage.py check
          - name: makemigrations
            run: uv run --locked python manage.py makemigrations --check
          - name: makemessages
            run: |
              uv run --locked python manage.py makemessages --all --no-location --no-obsolete
              git diff --exit-code ":(glob)**/*.po"

output:
  - meta
  - summary
