min_version: 2.1.9

pre-commit:
  jobs:
    - name: prettier
      run: npx --no-install prettier --check .
    - name: uv
      group:
        jobs:
          - name: sync
            run: uv sync --check
          - name: lock
            run: uv lock --check

commit-msg:
  jobs:
    - name: commitlint
      only:
        - ref: main
      run: npx --no-install commitlint --edit {1}
