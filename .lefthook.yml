min_version: 2.1.9

pre-commit:
  jobs:
    - name: prettier
      run: npx --no-install prettier --check .
    - name: uv
      group:
        jobs:
          - name: sync
            run: uv sync --check
          - name: lock
            run: uv lock --check
    - name: ruff
      env:
        UV_NO_SYNC: "true"
      group:
        jobs:
          - name: check
            run: uv run ruff check .
          - name: format
            run: uv run ruff format --diff .

commit-msg:
  jobs:
    - name: commitlint
      only:
        - ref: main
      run: npx --no-install commitlint --edit {1}
