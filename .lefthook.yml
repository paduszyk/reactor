pre-commit:
  jobs:
    - name: prettier
      run: |
        npx prettier --check .
    - name: uv
      run: |
        uv lock --check
    - name: ruff
      group:
        jobs:
          - name: check
            run: |
              uv run ruff check .
          - name: format
            run: |
              uv run ruff format --diff .
    - name: django
      group:
        jobs:
          - name: check
            run: |
              uv run python manage.py check --fail-level=ERROR
          - name: makemigrations
            run: |
              uv run python manage.py makemigrations --check
          - name: makemessages
            run: |
              uv run python manage.py makemessages --all --no-location --no-obsolete
              git diff --exit-code ":(glob)**/*.po"

output:
  - meta
  - summary
