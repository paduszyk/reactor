services:
  uv:
    image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
    environment:
      - UV_LINK_MODE=copy
    volumes:
      - ../..:/workspaces
  postgres:
    image: postgres:17
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - 5432:5432

volumes:
  postgres:
