services:
  uv:
    image: ghcr.io/astral-sh/uv:0.11.31-python3.14-trixie-slim
    environment:
      - UV_LINK_MODE=copy
    volumes:
      - ../..:/workspaces
  postgres:
    image: postgres:18
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - postgres:/var/lib/postgresql
    ports:
      - 5432:5432

volumes:
  postgres:
