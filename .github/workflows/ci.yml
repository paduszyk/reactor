name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          cache: npm
      - run: npm install --no-save prettier
      - run: npx prettier --check .
  uv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv lock --check
  ruff:
    needs:
      - uv
    strategy:
      matrix:
        include:
          - name: linter
            args: check --output-format=github
          - name: formatter
            args: format --diff
      fail-fast: false
    name: ruff (${{ matrix.name }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --only-group=ruff --frozen
      - run: uv run ruff ${{ matrix.args }} .
