name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          cache: npm
      - name: Install Commitlint
        run: npm install --no-save @commitlint/{cli,config-conventional}
      - name: Run Commitlint (last commit)
        if: ${{ github.event_name == 'push' }}
        run: npx commitlint --last --verbose
      - name: Run Commitlint (PR commits)
        if: ${{ github.event_name == 'pull_request' }}
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          cache: npm
      - name: Install Prettier
        run: |
          npm install --no-save prettier
      - name: Run Prettier
        run: |
          npx prettier --check .
  uv:
    name: uv.lock check
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Check uv.lock
        run: |
          uv lock --check
  ruff:
    needs:
      - uv
    strategy:
      matrix:
        include:
          - name: Linter
            args: check --output-format github
          - name: Formatter
            args: format --diff
      fail-fast: false
    name: "Ruff: ${{ matrix.name }}"
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Ruff
        run: |
          uv sync --only-group ruff --frozen
      - name: Run Ruff
        run: |
          uv run ruff ${{ matrix.args }}
  djlint:
    needs:
      - uv
    strategy:
      matrix:
        include:
          - name: Linter
            args: --lint --check .
          - name: Formatter
            args: --reformat --check .
      fail-fast: false
    name: "djLint: ${{ matrix.name }}"
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install djLint
        run: |
          uv sync --only-group djlint --frozen
      - name: Run djLint
        run: |
          uv run djlint ${{ matrix.args }}
  django:
    needs:
      - uv
    strategy:
      matrix:
        include:
          - name: System check
            args: check
          - name: Migrations
            args: makemigrations --check
          - name: Translations
            args: makemessages --all --no-location --no-obsolete
      fail-fast: false
    name: "Django: ${{ matrix.name }}"
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install gettext
        if: ${{ matrix.name == 'Translations' }}
        run: |
          sudo apt-get install gettext
      - name: Install dependencies
        run: |
          uv sync --frozen
      - name: Run Django
        run: |
          uv run python -m django ${{ matrix.args }}
        env:
          DJANGO_SETTINGS_MODULE: reactor.conf.settings.dev
      - name: Check for changes
        if: ${{ matrix.name == 'Translations' }}
        run: |
          git add . && git diff --exit-code
