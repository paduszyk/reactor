name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          cache: npm
      - run: npm i -D
      - run: npx prettier --check .
      - run: npx markdownlint-cli2
      - uses: actions/cache@v4
        id: poetry-cache
        with:
          path: ~/.local
          key: poetry
      - if: ${{ steps.poetry-cache.outputs.cache-hit != 'true' }}
        uses: snok/install-poetry@v1
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: poetry
      - run: poetry install --only "main, lint"
      - run: poetry run ruff check
      - run: poetry run ruff format
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        database-engine:
          - postgres
          - sqlite
      fail-fast: false
    services:
      postgres:
        image: ${{ matrix.database-engine == 'postgres' && 'postgres:latest' || '' }}
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
    env:
      DATABASE_ENGINE: ${{ matrix.database-engine }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        id: poetry-cache
        with:
          path: ~/.local
          key: poetry
      - if: ${{ steps.poetry-cache.outputs.cache-hit != 'true' }}
        uses: snok/install-poetry@v1
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: poetry
      - run: poetry install --only "main, test" --extras ${{ matrix.database-engine }}
      - run: poetry run python manage.py check
      - run: poetry run python manage.py makemigrations --check --dry-run --no-input
      - run: poetry run python manage.py migrate --no-input
      - run: poetry run pytest
