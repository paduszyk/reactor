name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DJANGO_DATABASE_SQLITE: "sqlite://:memory:"

jobs:
  poetry:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4.1.2
      - name: Cache Poetry
        id: cache-poetry
        uses: actions/cache@v4.0.2
        with:
          path: ~/.local
          key: poetry
      - name: Install Poetry
        if: steps.cache-poetry.outputs.cache-hit != 'true'
        uses: snok/install-poetry@v1.3.4
      - name: Set up Python
        uses: actions/setup-python@v5.1.0
      - name: Run Poetry commands
        run: |
          poetry check
          poetry lock --no-update
          poetry install --sync
          poetry build
  django:
    needs: poetry
    runs-on: ubuntu-latest
    strategy:
      matrix:
        django-database-engine:
          - sqlite
      fail-fast: false
    env:
      DJANGO_DATABASE_ENGINE: ${{ matrix.django-database-engine }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.2
      - name: Cache Poetry
        uses: actions/cache@v4.0.2
        id: cache-poetry
        with:
          path: ~/.local
          key: poetry
      - name: Install Poetry
        if: steps.cache-poetry.outputs.cache-hit != 'true'
        uses: snok/install-poetry@v1.3.4
      - name: Set up Python
        uses: actions/setup-python@v5.1.0
        with:
          cache: poetry
      - name: Install depenedencies
        run: poetry install --only main --extras ${{ matrix.django-database-engine }}
      - name: Run Django management commands
        working-directory: ./src
        run: |
          poetry run python manage.py check
          poetry run python manage.py makemigrations --dry-run --check --no-input
          poetry run python manage.py migrate --no-input
  tests:
    needs: django
    runs-on: ubuntu-latest
    strategy:
      matrix:
        django-database-engine:
          - sqlite
    env:
      DJANGO_DATABASE_ENGINE: ${{ matrix.django-database-engine }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.2
      - name: Cache Poetry
        uses: actions/cache@v4.0.2
        id: cache-poetry
        with:
          path: ~/.local
          key: poetry
      - name: Install Poetry
        if: steps.cache-poetry.outputs.cache-hit != 'true'
        uses: snok/install-poetry@v1.3.4
      - name: Set up Python
        uses: actions/setup-python@v5.1.0
        with:
          cache: poetry
      - name: Install depenedencies
        run: poetry install --with test --extras ${{ matrix.django-database-engine }}
      - name: Run tests
        run: poetry run pytest
