name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          cache: npm
      - run: npm install --no-save prettier
      - run: npx prettier --check .
  uv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv lock --check
  ruff:
    needs:
      - uv
    strategy:
      matrix:
        include:
          - name: linter
            args: check --output-format=github
          - name: formatter
            args: format --diff
      fail-fast: false
    name: ruff (${{ matrix.name }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --only-group=ruff --frozen
      - run: uv run ruff ${{ matrix.args }} .
  django:
    needs:
      - uv
    strategy:
      matrix:
        include:
          - name: system check
            args: check --fail-level=ERROR
          - name: migrations
            args: makemigrations --check
          - name: translations
            args: makemessages --all --no-location && git diff --exit-code "*.po"
      fail-fast: false
    name: django (${{ matrix.name }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen
      - if: ${{ matrix.name == 'translations' }}
        run: sudo apt-get update && sudo apt-get install --yes gettext
      - run: uv run python -m django ${{ matrix.args }}
        env:
          DJANGO_SETTINGS_MODULE: reactor.conf.settings.dev
      - if: ${{ matrix.name == 'translations' }}
        run: git diff --exit-code "*.po"
  pytest:
    needs:
      - django
    strategy:
      matrix:
        include:
          - name: sqlite3
            database-url: sqlite:///db.sqlite3
          - name: postgres
            database-url: postgres://postgres:postgres@localhost:5432/postgres
      fail-fast: false
    name: pytest (${{ matrix.name }})
    services:
      postgres:
        image: ${{ matrix.name == 'postgres' && 'postgres:17' || '' }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --group=tests --frozen
      - run: uv run pytest
        env:
          DJANGO_DATABASE_URL: ${{ matrix.database-url }}
