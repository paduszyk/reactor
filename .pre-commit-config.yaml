default_stages:
  - pre-commit

default_install_hook_types:
  - pre-commit

repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx prettier --check .
        language: system
        pass_filenames: false
      - id: markdownlint-cli2
        name: markdownlint-cli2
        entry: npx markdownlint-cli2
        language: system
        pass_filenames: false
      - id: poetry-check
        name: poetry-check
        entry: poetry check --lock
        language: system
        pass_filenames: false
