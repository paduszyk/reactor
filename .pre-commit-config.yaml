default_stages:
  - pre-commit

default_install_hook_types:
  - pre-commit

repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx prettier --check .
        language: system
        pass_filenames: false
      - id: markdownlint-cli2
        name: markdownlint-cli2
        entry: npx markdownlint-cli2
        language: system
        pass_filenames: false
      - id: poetry-check
        name: poetry-check
        entry: poetry check --lock
        language: system
        pass_filenames: false
      - id: ruff-check
        name: ruff-check
        entry: poetry run ruff check
        language: system
        pass_filenames: false
      - id: ruff-format
        name: ruff-format
        entry: poetry run ruff format
        language: system
        pass_filenames: false
      - id: django-check
        name: django-check
        language: system
        entry: poetry run python manage.py check
        pass_filenames: false
      - id: django-makemigrations
        name: django-makemigrations
        language: system
        entry: poetry run python manage.py makemigrations --check --dry-run --no-input
        pass_filenames: false
      - id: django-makemessages
        name: django-makemessages
        language: system
        entry: poetry run python manage.py makemessages --all --no-location
        pass_filenames: false
