default_stages:
  - pre-commit

default_install_hook_types:
  - commit-msg
  - pre-commit

repos:
  - repo: local
    hooks:
      - id: commitlint
        name: commitlint
        entry: npx commitlint --edit
        language: system
        pass_filenames: false
        stages:
          - commit-msg
      - id: poetry
        name: poetry-check
        entry: poetry check --lock
        language: system
        pass_filenames: false
      - id: prettier
        name: prettier
        entry: npx prettier --check .
        language: system
        pass_filenames: false
      - id: markdownlint-cli2
        name: markdownlint-cli2
        entry: npx markdownlint-cli2
        language: system
        pass_filenames: false
      - id: ruff-check
        name: ruff-check
        entry: poetry run ruff check
        language: system
        pass_filenames: false
      - id: ruff-format
        name: ruff-format
        entry: poetry run ruff format
        language: system
        pass_filenames: false
