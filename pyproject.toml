[project]
name = "reactor"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
  "dj-database-url>=2.3.0",
  "django>=5.1.6",
  "python-decouple>=3.8",
]

[project.optional-dependencies]
sqlite = []
postgres = [
  "psycopg[binary]>=3.2.5",
]

[dependency-groups]
local = [
  "django-debug-toolbar>=5.0.1",
]
ruff = [
  "ruff>=0.9.7",
]
