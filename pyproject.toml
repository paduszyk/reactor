[project]
name = "reactor"
version = "0.1-alpha.0"
requires-python = ">=3.13"
dependencies = [
  "dj-database-url>=3.0.0",
  "django>=5.2.2",
  "pillow>=11.2.1",
  "psycopg[binary]>=3.2.9",
  "python-decouple>=3.8",
]

[dependency-groups]
djlint = [
  "djlint>=1.36.4",
]
ruff = [
  "ruff>=0.11.13",
]
tests = [
  "model-bakery>=1.20.4",
  "pytest>=8.4.0",
  "pytest-cov>=6.1.1",
  "pytest-django>=4.11.1",
  "pytest-env>=1.1.5",
  "pytest-mock>=3.14.1",
  "pytest-randomly>=3.16.0",
]
