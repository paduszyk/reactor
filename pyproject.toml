[project]
name = "reactor"
version = "1.dev0"
requires-python = ">=3.14"
dependencies = [
  "django>=6.0.6,<7.0.0",
  "environs[django]>=15.0.1,<16.0.0",
]

[dependency-groups]
debug = [
  "django-debug-toolbar>=6.3.0,<7.0.0",
]
dev = [
  { include-group = "debug" },
  { include-group = "djlint" },
  { include-group = "nox" },
  { include-group = "pytest" },
  { include-group = "ruff" },
]
djlint = [
  "djlint>=1.39.4,<2.0.0",
]
nox = [
  "nox==2026.4.10",
  "nox-uv>=0.8.0,<0.9.0",
]
pytest = [
  "model-bakery>=1.24.0,<2.0.0",
  "pytest>=9.1.1,<10.0.0",
  "pytest-cov>=7.1.0,<8.0.0",
  "pytest-django>=4.12.0,<5.0.0",
  "pytest-env>=1.6.0,<2.0.0",
  "pytest-mock>=3.15.1,<4.0.0",
  "pytest-randomly>=4.1.0,<5.0.0",
  "pytest-repeat>=0.9.4,<0.10.0",
]
ruff = [
  "ruff>=0.15.19,<0.16.0",
]
