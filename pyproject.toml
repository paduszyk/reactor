[tool.poetry]
package-mode = false

[tool.poetry.dependencies]
python = "^3.13"
django = "^5.1.2"
django-environ = "^0.11.2"

[tool.poetry.group.dev.dependencies]
django-debug-toolbar = "^4.4.6"
django-schema-graph = "^3.1.0"
django-xlsx-serializer = "^1.0.1"
djlint = "^1.35.2"
pre-commit = "^4.0.1"
ruff = "^0.6.9"

[tool.ruff]
target-version = "py313"
extend-exclude = [
  "**/migrations/**/*.py",
]

[tool.ruff.lint]
select = ["ALL"]
ignore = [
  "ANN",
  "ARG",
  "D",
  "N",
  "RUF012",
]

[tool.ruff.lint.isort]
known-first-party = [
  "reactor",
]
section-order = [
  "future",
  "standard-library",
  "third-party",
  "django",
  "first-party",
  "local-folder",
]

[tool.ruff.lint.isort.sections]
django = ["django"]

[tool.ruff.lint.flake8-self]
ignore-names = [
  "_meta",
]

[tool.djlint]
profile = "django"
indent = 2
max_blank_lines = 1
blank_line_after_tag = "extends"
