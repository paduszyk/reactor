  "django>=5.2",
  "psycopg[binary]>=3.2.6",
  "python-decouple>=3.8",
]

[dependency-groups]
dev = [
  "django-debug-toolbar>=5.1.0",
  "django-schema-graph>=3.1.0",
  "django-xlsx-serializer>=1.1.0",
  "ruff>=0.11.6",
]
