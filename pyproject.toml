# Poetry
# https://python-poetry.org

[tool.poetry]
package-mode = false

[tool.poetry.dependencies]
python = "^3.12"
django = "^5.0.8"
django-configurations = {version = "^2.5.1", extras = ["database"]}
gunicorn = {version = "^22.0.0", optional = true}
pillow = "^10.4.0"
psycopg = {version = "^3.2.1", extras = ["binary"]}
whitenoise = {version = "^6.7.0", optional = true}

[tool.poetry.group.dev.dependencies]
django-debug-toolbar = "^4.4.6"
django-extensions = "^3.2.3"
django-schema-graph = "^3.1.0"
django-xlsx-serializer = "^1.0.0"
python-dotenv = "^1.0.1"
ipython = "^8.26.0"
pre-commit = "^3.8.0"

[tool.poetry.group.lint.dependencies]
ruff = "^0.5.7"
djlint = "^1.34.1"

[tool.poetry.group.test.dependencies]
model-bakery = "^1.18.2"
pytest = "^8.3.2"
pytest-cov = "^5.0.0"
pytest-custom-exit-code = "^0.3.0"
pytest-django = "^4.8.0"
pytest-mock = "^3.14.0"

[tool.poetry.extras]
prod = [
  "gunicorn",
  "whitenoise",
]

# Ruff
# https://docs.astral.sh/ruff/

[tool.ruff]
target-version = "py312"
extend-exclude = [
  "**/migrations/**/*.py",
]

[tool.ruff.lint]
select = [
  "ALL",
]
extend-select = [
  "RUF100",
]
ignore = [
  "ANN",
  "D",
  "N",
  "PL",
  "PYI",
  "RUF",
  "TCH",
]

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F403"]
"**/tests/**/*.py" = [
  "ARG",
  "DJ",
  "E501",
  "FBT",
  "S",
]

[tool.ruff.lint.isort]
known-first-party = [
  "reactor",
]
section-order = [
  "future",
  "standard-library",
  "third-party",
  "django",
  "first-party",
  "tests",
  "local-folder",
]

[tool.ruff.lint.isort.sections]
"django" = ["django"]
"tests" = ["tests"]

[tool.ruff.lint.flake8-self]
extend-ignore-names = [
  "_base_manager",
  "_default_manager",
  "_meta",
]

# djLint
# https://www.djlint.com

[tool.djlint]
profile = "django"
indent = 2
max_blank_lines = 1
blank_line_after_tag = "extends"

# Pytest
# https://docs.pytest.org/

[tool.pytest.ini_options]
addopts = [
  "-ra",
  "-q",
  "--doctest-modules",
  "--cov",
  "--cov-append",
  "--cov-report=term",
  "--suppress-no-test-exit-code",
  "--ds=tests.settings",
  "--dc=Test"
]
filterwarnings = [
  "ignore::DeprecationWarning",
  "ignore::PendingDeprecationWarning",
]
python_files = [
  "test_*.py",
  "tests.py",
]
pythonpath = [
  ".",
  "src/",
]
testpaths = [
  "src/",
  "tests/",
]

# Coverage.py
# https://coverage.readthedocs.io/

[tool.coverage.run]
branch = true
source = ["src/"]

[tool.coverage.report]
exclude_also = [
  "@(abc\\.)?abstractmethod$",
  "def __repr__",
  "def __str__",
  "if __name__ == .__main__.:",
  "raise NotImplementedError",
]
omit = [
  "**/conf/**/*.py",
  "**/migrations/**/*.py",
  "**/settings.py",
  "**/urls.py",
  "**/wsgi.py",
]
show_missing = true
skip_covered = true
skip_empty = true
