[project]
name = "reactor"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
  "dj-database-url>=2.3.0",
  "django>=5.2",
  "psycopg[binary]>=3.2.6",
  "python-decouple>=3.8",
]

[dependency-groups]
djlint = [
  "djlint>=1.36.4",
]
local = [
  "django-debug-toolbar>=5.1.0",
]
pytest = [
  "pytest>=8.3.5",
  "pytest-cov>=6.1.0",
  "pytest-custom-exit-code>=0.3.0",
  "pytest-django>=4.11.1",
  "pytest-mock>=3.14.0",
  "pytest-randomly>=3.16.0",
]
ruff = [
  "ruff>=0.11.4",
]
