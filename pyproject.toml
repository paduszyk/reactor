dependencies = [
  "django>=5.1.4",
]

[project.optional-dependencies]
sqlite = []

[dependency-groups]
local = [
  "django-debug-toolbar>=4.4.6",
  "django-extensions>=3.2.3",
  "django-schema-graph>=3.1.0",
  "django-xlsx-serializer>=1.0.1",
  "ipython>=8.30.0",
  "pre-commit>=4.0.1",
]
ruff = [
