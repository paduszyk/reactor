# Poetry
# https://python-poetry.org/docs/pyproject/

[tool.poetry]
name = "reactor"
version = "0.1.0"
description = "Research Activity Output Repository"
license = "BSD-3-Clause"
authors = [
  "Kamil Paduszyński <92403542+paduszyk@users.noreply.github.com>",
]
readme = "docs/README.md"
repository = "https://github.com/paduszyk/reactor"
packages = [
  { include = "**/*", from = "src" },
]

[tool.poetry.dependencies]
python = "^3.11"
django = "^5.0.3"
django-configurations = { version = "^2.5.1", extras = ["database"] }

[tool.poetry.group.dev.dependencies]
pre-commit = "^3.7.0"

[tool.poetry.group.lint.dependencies]
ruff = "^0.3.4"

[tool.poetry.group.test.dependencies]
model-bakery = "^1.17.0"
pytest = "^8.1.1"
pytest-cov = "^5.0.0"
pytest-custom-exit-code = "^0.3.0"
pytest-django = "^4.8.0"
pytest-mock = "^3.14.0"

[tool.poetry.extras]
"sqlite" = []
