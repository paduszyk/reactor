[project]
name = "reactor"
version = "1.0.dev0"
requires-python = ">=3.14"
dependencies = [
  "dj-database-url>=3.0.1,<4",
  "django>=5.2.7,<6",
  "pillow>=12.0.0,<13",
  "psycopg[binary]>=3.2.11,<4",
  "python-decouple>=3.8,<4",
]

[dependency-groups]
dev = [
  { include-group = "debug" },
  { include-group = "djlint" },
  { include-group = "ruff" },
]
debug = [
  "django-debug-toolbar>=6.0.0,<7",
]
djlint = [
  "djlint>=1.36.4,<2",
]
ruff = [
  "ruff>=0.14.2,<0.15",
]
