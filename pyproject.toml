[project]
name = "reactor"
version = "0"
requires-python = ">=3.13"
dependencies = [
  "django>=5.2.6,<6",
  "environs[django]>=14.3.0,<15",
  "pillow>=11.3.0,<12",
  "psycopg[binary]>=3.2.10,<4",
]

[dependency-groups]
dev = [
  { include-group = "debug" },
  { include-group = "djlint" },
  { include-group = "pytest" },
  { include-group = "ruff" },
]
debug = [
  "django-debug-toolbar>=6.0.0,<7",
]
djlint = [
  "djlint>=1.36.4,<2",
]
pytest = [
  "model-bakery>=1.20.5,<2",
  "pytest>=8.4.2,<9",
  "pytest-cov>=7.0.0,<8",
  "pytest-custom-exit-code>=0.3.0,<0.4",
  "pytest-django>=4.11.1,<5",
  "pytest-env>=1.1.5,<2",
  "pytest-mock>=3.15.1,<4",
  "pytest-randomly>=4.0.1,<5",
]
ruff = [
  "ruff>=0.13.2,<0.14",
]
