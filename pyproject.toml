[project]
name = "reactor"
version = "0"
requires-python = ">=3.13"
dependencies = [
  "django>=5.2.6,<6",
  "django-storages>=1.14.6,<2",
  "environs[django]>=14.3.0,<15",
  "gunicorn>=23.0.0,<24",
  "pillow>=11.3.0,<12",
  "psycopg[binary]>=3.2.10,<4",
  "whitenoise>=6.10.0,<7",
]

[dependency-groups]
dev = [
  "django-debug-toolbar>=6.0.0,<7",
  "djlint>=1.36.4,<2",
  "model-bakery>=1.20.5,<2",
  "pytest>=8.4.2,<9",
  "pytest-cov>=6.3.0,<7",
  "pytest-django>=4.11.1,<5",
  "pytest-mock>=3.15.0,<4",
  "pytest-randomly>=3.16.0,<4",
  "ruff>=0.13.0,<0.14",
]
