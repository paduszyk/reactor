[project]
name = "reactor"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
  "dj-database-url>=2.3.0",
  "django>=5.1.4",
]

[dependency-groups]
local = [
  "pre-commit>=4.0.1",
  "python-dotenv>=1.0.1",
]
ruff = [
  "ruff>=0.8.5",
]
tests = [
  "pytest>=8.3.4",
  "pytest-cov>=6.0.0",
  "pytest-custom-exit-code>=0.3.0",
  "pytest-django>=4.9.0",
  "pytest-env>=1.1.5",
  "pytest-mock>=3.14.0",
  "pytest-randomly>=3.16.0",
]
