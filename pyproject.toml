requires-python = ">=3.13"
dependencies = [
  "dj-database-url>=3.0.0",
  "django>=5.2.3",
  "python-decouple>=3.8",
]

[dependency-groups]
dev = [
  "djlint>=1.36.4",
  "lefthook>=1.11.13",
  "model-bakery>=1.20.5",
  "pytest>=8.4.0",
  "pytest-cov>=6.2.1",
  "pytest-django>=4.11.1",
  "pytest-env>=1.1.5",
  "pytest-mock>=3.14.1",
  "pytest-randomly>=3.16.0",
  "ruff>=0.11.13",
]
