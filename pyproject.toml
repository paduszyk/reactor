[project]
name = "reactor"
version = "1-alpha.0"
requires-python = "~=3.13.5"
dependencies = [
  "dj-database-url~=3.0",
  "django~=5.2",
  "pillow~=11.3",
  "psycopg[binary]~=3.2",
  "python-decouple~=3.8",
]

[dependency-groups]
dev = [
  "django-debug-toolbar~=5.2",
  "django-schema-graph~=3.1",
  "djlint~=1.36",
  "model-bakery~=1.20",
  "pytest~=8.4",
  "pytest-cov~=6.2",
  "pytest-custom-exit-code~=0.3.0",
  "pytest-django~=4.11",
  "pytest-env~=1.1",
  "pytest-mock~=3.14",
  "pytest-randomly~=3.16",
  "ruff~=0.12.2",
]
