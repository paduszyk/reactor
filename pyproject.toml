[project]
name = "reactor"
version = "1a0"
requires-python = "~=3.13.5"
dependencies = [
  "dj-database-url~=3.0.1",
  "django~=5.2.4",
  "pillow~=11.3.0",
  "psycopg[binary]~=3.2.9",
  "python-decouple~=3.8",
]

[dependency-groups]
djlint = [
  "djlint~=1.36.4",
]
local = [
  "django-debug-toolbar~=5.2.0",
]
pytest = [
  "model-bakery~=1.20.5",
  "pytest~=8.4.1",
  "pytest-cov~=6.2.1",
  "pytest-custom-exit-code~=0.3.0",
  "pytest-django~=4.11.1",
  "pytest-env~=1.1.5",
  "pytest-mock~=3.14.1",
  "pytest-randomly~=3.16.0",
]
ruff = [
  "ruff~=0.12.5",
]
