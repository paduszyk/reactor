[project]
name = "reactor"
version = "0"
requires-python = ">=3.13"
dependencies = [
  "django>=5.2.6,<6",
  "environs[django]>=14.3.0,<15",
  "pillow>=11.3.0,<12",
  "psycopg[binary]>=3.2.10,<4",
]

[dependency-groups]
dev = [
  { include-group = "debug" },
  { include-group = "djlint" },
  { include-group = "ruff" },
]
debug = [
  "django-debug-toolbar>=6.0.0,<7",
]
djlint = [
  "djlint>=1.36.4,<2",
]
ruff = [
  "ruff>=0.13.2,<0.14",
]
