[project]
name = "reactor"
version = "1.0-alpha.0"
requires-python = "~=3.13.5"
dependencies = [
  "dj-database-url~=3.0",
  "django~=5.2",
  "pillow~=11.2",
  "psycopg[binary]~=3.2",
  "python-decouple~=3.8",
]

[dependency-groups]
ruff = [
  "ruff~=0.12.0",
]
tests = [
  "model-bakery~=1.20",
  "pytest~=8.4",
  "pytest-cov~=6.2",
  "pytest-custom-exit-code~=0.3.0",
  "pytest-django~=4.11",
  "pytest-env~=1.1",
  "pytest-mock~=3.14",
  "pytest-randomly~=3.16",
]
