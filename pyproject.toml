[project]
name = "reactor"
version = "1-dev"
requires-python = ">=3.13"
dependencies = [
  "dj-database-url>=2.3.0",
  "django>=5.2",
  "psycopg[binary]>=3.2.6",
  "python-decouple>=3.8",
]

[dependency-groups]
dev = [
  "django-debug-toolbar>=5.1.0",
  "django-schema-graph>=3.1.0",
  "django-xlsx-serializer>=1.1.0",
  "model-bakery>=1.20.4",
  "pytest>=8.3.5",
  "pytest-cov>=6.1.1",
  "pytest-custom-exit-code>=0.3.0",
  "pytest-django>=4.11.1",
  "pytest-env>=1.1.5",
  "pytest-mock>=3.14.0",
  "pytest-randomly>=3.16.0",
  "ruff>=0.11.6",
]
