# Poetry
# https://python-poetry.org

[tool.poetry]
package-mode = false

[tool.poetry.dependencies]
python = "^3.12"

[tool.poetry.group.dev.dependencies]
pre-commit = "^3.8.0"

[tool.poetry.group.lint.dependencies]
ruff = "^0.5.7"

[tool.poetry.group.test.dependencies]
pytest = "^8.3.2"
pytest-cov = "^5.0.0"
pytest-custom-exit-code = "^0.3.0"
pytest-mock = "^3.14.0"

# Ruff
# https://docs.astral.sh/ruff/

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = [
  "ALL",
]
extend-select = [
  "RUF100",
]
ignore = [
  "ANN",
  "D",
  "N",
  "PL",
  "PYI",
  "RUF",
  "TCH",
]

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F403"]
"**/tests/**/*.py" = [
  "ARG",
  "E501",
  "FBT",
  "S",
]

[tool.ruff.lint.isort]
known-first-party = [
  "reactor",
]
section-order = [
  "future",
  "standard-library",
  "third-party",
  "first-party",
  "tests",
  "local-folder",
]

[tool.ruff.lint.isort.sections]
"tests" = ["tests"]

# Pytest
# https://docs.pytest.org/

[tool.pytest.ini_options]
addopts = [
  "-ra",
  "-q",
  "--doctest-modules",
  "--cov",
  "--cov-append",
  "--cov-report=term",
  "--suppress-no-test-exit-code",
]
filterwarnings = [
  "ignore::DeprecationWarning",
  "ignore::PendingDeprecationWarning",
]
python_files = [
  "test_*.py",
  "tests.py",
]
pythonpath = [
  ".",
  "src/",
]
testpaths = [
  "src/",
  "tests/",
]

# Coverage.py
# https://coverage.readthedocs.io/

[tool.coverage.run]
branch = true
source = ["src/"]

[tool.coverage.report]
exclude_also = [
  "@(abc\\.)?abstractmethod$",
  "def __repr__",
  "def __str__",
  "if __name__ == .__main__.:",
  "raise NotImplementedError",
]
show_missing = true
skip_covered = true
skip_empty = true
