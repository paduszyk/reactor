# Poetry
# https://python-poetry.org

[tool.poetry]
package-mode = false

[tool.poetry.dependencies]
python = "^3.12"

[tool.poetry.group.dev.dependencies]
pre-commit = "^3.7.1"

[tool.poetry.group.lint.dependencies]
ruff = "^0.5.0"

# Ruff
# https://docs.astral.sh/ruff/

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
  "ANN",
  "ARG",
  "COM812",
  "D1",
  "D205",
  "ISC001",
  "N802",
  "N806",
  "PYI",
  "RUF005",
  "RUF012",
  "TCH",
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
known-first-party = ["reactor"]
section-order = [
  "future",
  "standard-library",
  "third-party",
  "first-party",
  "local-folder",
]
