[project]
name = "reactor"
version = "1-alpha.0"
requires-python = ">=3.13"
dependencies = [
  "django>=5.2.1",
  "environs[django]>=14.1.1",
  "psycopg[binary]>=3.2.9",
]

[dependency-groups]
dev = [
  "django-debug-toolbar>=5.2.0",
  "model-bakery>=1.20.4",
  "pytest>=8.3.5",
  "pytest-cov>=6.1.1",
  "pytest-django>=4.11.1",
  "pytest-env>=1.1.5",
  "pytest-mock>=3.14.0",
  "pytest-randomly>=3.16.0",
  "ruff>=0.11.10",
]
