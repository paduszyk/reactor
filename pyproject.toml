[project]
name = "reactor"
version = "1.dev0"
requires-python = ">=3.14"
dependencies = [
  "django>=6.0.6,<7.0.0",
  "environs[django]>=15.0.1,<16.0.0",
]

[dependency-groups]
debug = [
  "django-debug-toolbar>=6.3.0,<7.0.0",
]
dev = [
  { include-group = "debug" },
  { include-group = "djlint" },
  { include-group = "ruff" },
]
djlint = [
  "djlint>=1.39.4,<2.0.0",
]
ruff = [
  "ruff>=0.15.19,<0.16.0",
]
