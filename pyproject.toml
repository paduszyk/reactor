[project]
name = "reactor"
version = "0.1.dev0"
requires-python = ">=3.14"
dependencies = [
  "django>=5.2.7,<6",
  "environs[django]>=14.3.0,<15",
  "pillow>=11.3.0,<12",
  "psycopg[binary]>=3.2.10,<4",
]

[dependency-groups]
ruff = [
  "ruff>=0.14.0,<0.15",
]

[tool.uv]
default-groups = []
required-version = ">=0.9.2,<0.10"
