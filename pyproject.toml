[project]
name = "reactor"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
  "dj-database-url>=2.3.0",
  "django>=5.1.6",
  "python-decouple>=3.8",
]

[project.optional-dependencies]
sqlite = []
postgres = [
  "psycopg[binary]>=3.2.5",
]

[dependency-groups]
djlint = [
  "djlint>=1.36.4",
]
local = [
  "django-debug-toolbar>=5.0.1",
  "lefthook>=1.11.0",
]
ruff = [
  "ruff>=0.9.7",
]
tests = [
  "pytest>=8.3.4",
  "pytest-cov>=6.0.0",
  "pytest-custom-exit-code>=0.3.0",
  "pytest-django>=4.10.0",
  "pytest-env>=1.1.5",
  "pytest-mock>=3.14.0",
  "pytest-randomly>=3.16.0",
]
