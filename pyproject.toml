[project]
name = "reactor"
version = "1.0.dev0"
requires-python = ">=3.14"
dependencies = [
  "django>=5.2.7,<6",
  "environs[django]>=14.3.0,<15",
  "pillow>=12.0.0,<13",
  "psycopg[binary]>=3.2.10,<4",
]

[dependency-groups]
dev = [
  "django-debug-toolbar>=6.0.0,<7",
]
djlint = [
  "djlint>=1.36.4,<2",
]
pytest = [
  "model-bakery>=1.20.5,<2",
  "pytest>=8.4.2,<9",
  "pytest-cov>=7.0.0,<8",
  "pytest-django>=4.11.1,<5",
  "pytest-env>=1.2.0,<2",
  "pytest-mock>=3.15.1,<4",
  "pytest-randomly>=4.0.1,<5",
]
ruff = [
  "ruff>=0.14.0,<0.15",
]

[tool.uv]
default-groups = []
required-version = ">=0.9.3,<0.10"
