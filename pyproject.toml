[project]
name = "reactor"
version = "0.1.dev0"
requires-python = ">=3.14"
dependencies = [
  "django>=5.2.7,<6",
  "django-storages>=1.14.6,<2",
  "environs[django]>=14.3.0,<15",
  "gunicorn>=23.0.0,<24",
  "pillow>=11.3.0,<12",
  "psycopg[binary]>=3.2.10,<4",
  "whitenoise>=6.11.0,<7",
]

[dependency-groups]
dev = [
  "django-debug-toolbar>=6.0.0,<7",
]
djlint = [
  "djlint>=1.36.4,<2",
]
nox = [
  "nox==2025.5.1",
]
pytest = [
  "model-bakery>=1.20.5,<2",
  "pytest>=8.4.2,<9",
  "pytest-cov>=7.0.0,<8",
  "pytest-custom-exit-code>=0.3.0,<0.4",
  "pytest-django>=4.11.1,<5",
  "pytest-env>=1.1.5,<2",
  "pytest-mock>=3.15.1,<4",
  "pytest-randomly>=4.0.1,<5",
]
ruff = [
  "ruff>=0.14.0,<0.15",
]

[tool.uv]
default-groups = []
required-version = ">=0.9.2,<0.10"
