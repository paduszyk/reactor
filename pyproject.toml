[project]
name = "reactor"
version = "1.0.dev0"
requires-python = ">=3.14"
dependencies = [
  "django>=5.2.7,<6",
  "environs[django]>=14.3.0,<15",
  "pillow>=12.0.0,<13",
  "psycopg[binary]>=3.2.10,<4",
]

[dependency-groups]
ruff = [
  "ruff>=0.14.0,<0.15",
]

[tool.uv]
default-groups = []
required-version = ">=0.9.3,<0.10"
