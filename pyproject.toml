[tool.poetry]
package-mode = false

[tool.poetry.dependencies]
python = "^3.13"
django = "^5.1.2"
django-environ = "^0.11.2"
pillow = "^11.0.0"
psycopg = {version = "^3.2.3", optional = true, extras = ["binary"]}

[tool.poetry.group.local.dependencies]
pre-commit = "^4.0.1"

[tool.poetry.group.lint.dependencies]
ruff = "^0.7.0"

[tool.poetry.group.test.dependencies]
pytest = "^8.3.3"
pytest-cov = "^5.0.0"
pytest-custom-exit-code = "^0.3.0"
pytest-django = "^4.9.0"
pytest-mock = "^3.14.0"
pytest-randomly = "^3.15.0"

[tool.poetry.extras]
postgres = ["psycopg"]
sqlite = []

[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
  "ANN",
  "ARG",
  "D1",
  "D205",
  "N",
  "RUF012",
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]
"test*.py" = ["E501", "FBT", "PLR2004", "S101"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
known-first-party = [
  "reactor",
]
section-order = [
  "future",
  "standard-library",
  "third-party",
  "django",
  "first-party",
  "local-folder",
]

[tool.ruff.lint.isort.sections]
django = ["django"]

[tool.ruff.lint.flake8-self]
ignore-names = ["_meta"]

[tool.pytest.ini_options]
addopts = [
  "-ra",
  "--ds=reactor.settings.test",
  "--cov",
  "--cov-branch",
  "--cov-report=term-missing:skip-covered",
  "--suppress-no-test-exit-code",
]
python_files = ["test*.py"]
testpaths = ["reactor/"]

[tool.coverage.report]
omit = [
  "reactor/**/settings.py",
  "reactor/**/test*.py",
  "reactor/**/urls.py",
  "reactor/settings/**/*.py",
]
