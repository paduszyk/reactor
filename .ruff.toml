extend-exclude = [
  "**/migrations/*.py",
]
target-version = "py313"

[lint]
ignore = [
  "ANN",
  "D",
  "RUF012",
]
select = ["ALL"]

[lint.per-file-ignores]
"**/__init__.py" = ["F403"]
"**/settings*.py" = ["N802"]
"**/test*.py" = ["S101", "S311"]

[lint.isort]
known-first-party = ["reactor"]
section-order = [
  "future",
  "standard-library",
  "third-party",
  "django",
  "first-party",
  "local-folder",
]

[lint.isort.sections]
django = ["django"]

[lint.flake8-self]
ignore-names = ["_meta"]
