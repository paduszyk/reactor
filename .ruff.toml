# Ruff
# https://docs.astral.sh/ruff/configuration/
# https://docs.astral.sh/ruff/rules/
# https://docs.astral.sh/ruff/settings/

target-version = "py311"

[lint]
select = [
  "F",
  "E",
  "W",
  "I",
  "D",
  "B",
]
ignore = ["E501", "D1", "D205"]

[lint.pydocstyle]
convention = "google"

[lint.isort]
section-order = [
  "future",
  "standard-library",
  "third-party",
  "django",
  "first-party",
  "local-folder",
]
known-first-party = ["reactor"]

[lint.isort.sections]
"django" = ["django"]
