[lint]
ignore = [
  "D",
]
select = ["ALL"]

[lint.per-file-ignores]
"tests/**/*.py" = [
  "ARG",
  "E501",
  "PLR2004",
  "S101",
]

[lint.isort]
section-order = [
  "future",
  "standard-library",
  "third-party",
  "django",
  "first-party",
  "local-folder",
]

[lint.isort.sections]
django = ["django"]
