[lint]
select = ["ALL"]
ignore = [
  "ANN",
  "D",
  "PLC0415",
  "RUF012",
]

[lint.per-file-ignores]
"tests/**/*.py" = [  # astral-sh/ruff#4368
  "ARG",
  "E501",
  "FBT",
  "PLR2004",
  "S101",
]

[lint.isort]
section-order = [
  "future",
  "standard-library",
  "third-party",
  "django",
  "first-party",
  "local-folder",
]

[lint.isort.sections]
django = ["django"]
