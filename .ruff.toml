extend-exclude = [
  "reactor/**/migrations/**/*.py",
]

[lint]
select = ["ALL"]
ignore = [
  "ANN",
  "D1",
  "PLC0415",
  "RUF012",
]

[lint.per-file-ignores]
"reactor/conf/settings/**/*.py" = [
  "N802",
]

[lint.isort]
section-order = [
  "future",
  "standard-library",
  "third-party",
  "django",
  "first-party",
  "local-folder",
]

[lint.isort.sections]
django = ["django"]

[lint.pydocstyle]
convention = "google"
